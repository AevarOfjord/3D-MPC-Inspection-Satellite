name: Bug report
description: Report a reproducible defect in runtime, UI, docs, or tooling.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide a minimal reproducible report.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact commands/clicks required.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste relevant logs and stack traces.
      render: shell
  - type: input
    id: version
    attributes:
      label: Commit/Version
      description: SHA, tag, or branch used.
      placeholder: main @ <sha>
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Backend (Python/FastAPI)
        - UI (React/Three.js)
        - Simulation Engine (C++/bindings)
        - Docs/Tooling
    validations:
      required: true
