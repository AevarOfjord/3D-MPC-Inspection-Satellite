name: Feature request
description: Propose an improvement with clear use case and acceptance criteria.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What limitation are you facing today?
      placeholder: Describe the current pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should be added/changed?
      placeholder: Describe the proposed behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other options you evaluated.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete checks for completion.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
