name: ci

on:
  push:
    branches: [main, "Py+C"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ffmpeg libeigen3-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg eigen

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Cache C++ build
        uses: actions/cache@v4
        with:
          path: build/
          key: cpp-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/satellite_control/cpp/*.cpp') }}
          restore-keys: cpp-${{ runner.os }}-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-build-isolation -e .

      - name: Lint Python
        run: python -m ruff check src tests --select E9,F63,F7,F82,F401,F541,F841,E402,E722

      - name: Run tests
        run: python -m pytest -q --tb=short --cov=src/satellite_control --cov-report=term-missing

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci

      - name: Lint UI
        run: npm run lint

      - name: Build UI
        run: npm run build

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install doc deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install sphinx sphinx-rtd-theme myst-parser
          python -m pip install -r requirements.txt

      - name: Build docs
        run: sphinx-build -W -b html docs docs/_build/html

  e2e:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ffmpeg libeigen3-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-build-isolation -e .

      - name: Run E2E simulation test
        env:
          RUN_E2E_SIM_TESTS: "1"
        run: python -m pytest -q tests/test_e2e_simulation.py --tb=short
