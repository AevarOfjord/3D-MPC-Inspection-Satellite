name: ci

on:
  push:
    branches: [main, "Py+C"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ffmpeg libeigen3-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg eigen

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Cache C++ build
        uses: actions/cache@v4
        with:
          path: build/
          key: cpp-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/cpp/**/*.cpp', 'src/cpp/**/*.hpp') }}
          restore-keys: cpp-${{ runner.os }}-

      - name: Install project
        run: |
          make install

      - name: Lint Python
        run: make lint-backend

      - name: Run tests
        run: make test-cov

  quality-fast:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ffmpeg libeigen3-dev

      - name: Install project
        run: make install

      - name: Run fast MPC quality contract
        run: |
          mkdir -p artifacts/quality
          .venv311/bin/python scripts/run_mpc_quality_suite.py \
            --fail-on-breach \
            --output artifacts/quality/fast_suite.json

      - name: Upload fast quality artifact
        uses: actions/upload-artifact@v4
        with:
          name: quality-fast-summary
          path: artifacts/quality/fast_suite.json

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci

      - name: Lint UI
        run: npm run lint

      - name: Build UI
        run: npm run build

      - name: Run UI unit tests (Vitest)
        run: npm run test

  ui-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run UI e2e smoke
        run: npm run test:e2e

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ffmpeg libeigen3-dev

      - name: Install project
        run: make install

      - name: Build package (size budget enforced)
        run: make package-app PACKAGE_MAX_MB=150

      - name: Verify package excludes virtualenv
        run: |
          LATEST_TAR=$(ls -t release/satellite-control-app-*.tar.gz | head -n1)
          test -n "$LATEST_TAR"
          if tar -tzf "$LATEST_TAR" | grep -q '^satellite-control-app/.venv311/'; then
            echo "Error: package archive contains .venv311/"
            exit 1
          fi

  package-pyinstaller:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ffmpeg libeigen3-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg eigen

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Install project
        run: make install

      - name: Build PyInstaller bundle
        run: make package-pyinstaller PACKAGE_MAX_MB=150

      - name: Smoke test PyInstaller bundle
        run: make smoke-pyinstaller

      - name: Upload PyInstaller artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-${{ runner.os }}
          path: release/SatelliteControl-*

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install doc deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install sphinx sphinx-rtd-theme myst-parser
          python -m pip install -r requirements.txt

      - name: Build docs
        run: sphinx-build -W -b html docs docs/_build/html

  e2e:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ffmpeg libeigen3-dev

      - name: Install project
        run: make install

      - name: Run E2E simulation test
        env:
          RUN_E2E_SIM_TESTS: "1"
        run: python -m pytest -q tests/test_e2e_simulation.py --tb=short

      - name: Run full MPC quality suite
        run: |
          mkdir -p artifacts/quality
          .venv311/bin/python scripts/run_mpc_quality_suite.py \
            --full \
            --fail-on-breach \
            --output artifacts/quality/full_suite.json

      - name: Upload full quality artifact
        uses: actions/upload-artifact@v4
        with:
          name: quality-full-summary
          path: artifacts/quality/full_suite.json

  v6-cutover-readiness:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: [e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ffmpeg libeigen3-dev

      - name: Install project
        run: make install

      - name: Download full quality summary
        uses: actions/download-artifact@v4
        with:
          name: quality-full-summary
          path: artifacts/quality

      - name: Evaluate V6 cutover readiness gate
        run: |
          mkdir -p artifacts/quality
          .venv311/bin/python scripts/check_v6_cutover_readiness.py \
            --suite-summary artifacts/quality/full_suite.json \
            --min-fast-consecutive 1 \
            --min-full-passes 1 \
            --skip-schema-migration-check \
            --fail-on-not-ready \
            --output artifacts/quality/cutover_readiness.json

      - name: Upload cutover readiness report
        uses: actions/upload-artifact@v4
        with:
          name: quality-cutover-readiness
          path: artifacts/quality/cutover_readiness.json
