name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Verify Python runtime baseline
        run: python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 11) else f'Expected Python 3.11.x, got {sys.version}')"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential git ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install --no-build-isolation -e .

      - name: Lint Python (high-signal rules)
        run: |
          python -m ruff check src tests --select E9,F63,F7,F82,F401,F541,F841,E402,E722

      - name: Run tests
        run: python -m pytest -q --tb=short --cov=src/satellite_control --cov-report=term-missing

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci

      - name: Lint UI
        run: npm run lint

      - name: Build UI
        run: npm run build
